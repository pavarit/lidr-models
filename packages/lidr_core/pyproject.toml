[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "lidr-core"
version = "0.1.0"
description = "Shared harness for lidr-models: backtest engine, eval/metrics, artifact contract, protocols, base learners."
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "Boon Boonyasirichok" }]
license = { text = "PolyForm-Noncommercial-1.0.0" }
dependencies = [
    "pandas>=2.0",
    "numpy>=1.24",
    "scikit-learn>=1.3",
    "lightgbm>=4.0",
    "yfinance>=0.2.40",
    "matplotlib>=3.7",
    "jsonschema>=4.0",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
"lidr_core.contract.schema" = ["*.json"]
