[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ta-ensemble"
version = "0.2.0"
description = "Six-signal technical-analysis ensemble for lidr-models. Wraps the SMA/RSI/MACD/Bollinger/breakout/volume signals + logistic / LightGBM learners against the lidr-core harness."
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "Boon Boonyasirichok" }]
license = { text = "PolyForm-Noncommercial-1.0.0" }
dependencies = [
    "lidr-core",
    "pandas>=2.0",
    "numpy>=1.24",
    "pyyaml>=6.0",
    "typer>=0.12",
]

[project.scripts]
ta-ensemble = "ta_ensemble.cli:app"

[tool.setuptools.packages.find]
where = ["src"]
