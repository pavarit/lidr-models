name: test

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install workspace packages
        run: |
          pip install -e ./packages/lidr_core
          pip install -e ./packages/ta_ensemble
          pip install -e ./packages/news_sentiment
          pip install -e ".[dev]"
      - name: Run tests
        run: make test PYTHON=python
      - name: Run lint
        run: make lint PYTHON=python
