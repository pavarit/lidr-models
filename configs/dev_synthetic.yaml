# Offline smoke test — same pipeline as baseline.yaml but with synthetic data.
# Used for tests, CI, and verifying the pipeline runs without internet.

name: dev_synthetic
description: |
  Offline-safe smoke test. Generates a synthetic price series with a known
  trend + noise so the pipeline can be exercised end-to-end without hitting
  yfinance. Do not interpret the metrics from this run as meaningful.

data:
  source: synthetic
  tickers: [FAKE]
  start_date: 2005-01-01
  end_date: 2026-05-01
  synthetic:
    drift_annual: 0.07     # 7% annual drift
    vol_annual: 0.16       # 16% annual vol
    seed: 42

signals:
  - name: sma_crossover
    params:
      fast: 20
      slow: 50

target:
  type: forward_return_binary
  horizon_days: 5
  threshold: 0.0

model:
  type: logistic_regression
  params:
    C: 1.0
    class_weight: balanced

backtest:
  cv: expanding_window
  initial_train_years: 3
  test_period_months: 12
  transaction_cost_bps: 5

output:
  report_html: true
  predictions_json: true
