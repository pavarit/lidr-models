# Six-signal LightGBM checkpoint.
# Same target / signals / backtest / costs as baseline_six_signals_unweighted.yaml;
# only the model class changes (logistic → LightGBM). Tests whether a nonlinear
# learner across the six features can extract day-to-day signal that the
# logistic model can't express (per the 2026-05-27 checkpoint analysis in
# CLAUDE.md → Recent Changes, both logistic configs collapsed to ~constant
# P(up) predictors).
#
# Conservative LightGBM defaults: modest tree count + standard leaf size so the
# smallest train windows (~5 years, ~1.2k rows) don't overfit.

name: baseline_six_signals_lightgbm
description: |
  Six-signal LightGBM baseline. Identical to baseline_six_signals_unweighted.yaml
  except `model.type: lightgbm`. Edge-gate checkpoint: does a nonlinear learner
  beat buy-and-hold where the logistic model could not?

data:
  source: yfinance
  tickers: [SPY]
  start_date: 2005-01-01
  end_date: 2026-05-01

signals:
  - name: sma_crossover
    params:
      fast: 50
      slow: 200
  - name: rsi
    params:
      period: 14
  - name: macd
    params:
      fast: 12
      slow: 26
      signal: 9
  - name: bollinger
    params:
      period: 20
  - name: breakout
    params:
      period: 252
  - name: volume
    params:
      period: 50

target:
  type: forward_return_binary
  horizon_days: 5
  threshold: 0.0

model:
  type: lightgbm
  params:
    n_estimators: 200
    learning_rate: 0.05
    num_leaves: 31
    min_child_samples: 20
    random_state: 0

backtest:
  cv: expanding_window
  initial_train_years: 5
  test_period_months: 12
  transaction_cost_bps: 5

output:
  predictions_json: true
